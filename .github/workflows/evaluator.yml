name: Model Evaluation (Trusted Boundary)

run-name: Model Eval - Inf ${{ inputs.infection_level }} - Seed ${{ inputs.seed }} - Nonce ${{ inputs.nonce }} - Phase ${{ inputs.phase }}

on:
  workflow_dispatch:
    inputs:
      huggingface_repo:
        description: 'Hugging Face repository ID (e.g., user/model_repo)'
        required: true
        type: string
      hf_revision:
        description: 'The Hugging Face commit SHA'
        required: true
        type: string
      eval_commit_sha:
        description: 'The Git commit SHA of the codebase that must match main'
        required: true
        type: string
      infection_level:
        description: 'The infection level of the run'
        required: true
        type: number
      seed:
        description: 'The random seed of the run'
        required: true
        type: number
      nonce:
        description: 'Unique execution nonce to prevent API polling races'
        required: true
        type: string
      phase:
        description: 'The execution phase (e.g., baseline_check, sweep_logging)'
        required: true
        type: string
      attestation_level:
        description: 'The attestation level of the run (tee_attested or spot_checked_interim)'
        required: true
        type: string

jobs:
  pre_flight_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Branch Protection (Hard API Gate)
        env:
          EVAL_PAT: ${{ secrets.EVAL_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use EVAL_PAT if available, otherwise default to GITHUB_TOKEN
          TOKEN="${EVAL_PAT:-$GITHUB_TOKEN}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/branches/main/protection)
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "CRITICAL ERROR: Branch protection on main is not active or cannot be verified! (HTTP $HTTP_STATUS)"
            exit 1
          fi
          
      - name: Interim Protocol Sunset Check
        run: |
          ATTESTATION="${{ inputs.attestation_level }}"
          if [ "$ATTESTATION" = "spot_checked_interim" ]; then
            CURRENT_DATE=$(date +%s)
            SUNSET_DATE=$(date -d "2026-09-01" +%s)
            if [ "$CURRENT_DATE" -gt "$SUNSET_DATE" ]; then
              echo "CRITICAL ERROR: The interim spot-check protocol sunset clause (Sept 1, 2026) has expired. Only tee_attested runs are allowed."
              exit 1
            fi
          fi

  evaluate:
    needs: pre_flight_checks
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository at pinned commit
        uses: actions/checkout@v4
        with:
          # Pin checkout to the exact commit SHA that the orchestrator used during training.
          # This eliminates the TOCTOU race where hotfixes pushed to main between
          # training and evaluation would cause a codebase mismatch.
          ref: ${{ inputs.eval_commit_sha }}
          fetch-depth: 1

      - name: Verify Code Commit Pinning
        run: |
          current_sha=$(git rev-parse HEAD)
          expected_sha="${{ inputs.eval_commit_sha }}"
          echo "Checked out SHA: $current_sha"
          echo "Expected SHA:    $expected_sha"
          if [ "$current_sha" != "$expected_sha" ]; then
            echo "CRITICAL ERROR: Checkout did not land on the expected commit!"
            exit 1
          fi
          echo "Commit pinning verified."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglx-mesa0 libosmesa6-dev libglew-dev libglfw3-dev patchelf
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu118
          pip install -r requirements.txt
          pip install gym-aloha==0.1.1 lerobot datasets cryptography pyyaml statsmodels
          
      - name: Download Checkpoint from Hugging Face Commit (Provenance Binding)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          import os
          hf_repo = '${{ inputs.huggingface_repo }}'
          revision = '${{ inputs.hf_revision }}'
          token = os.environ.get('HF_TOKEN')
          print(f'Downloading from {hf_repo} revision {revision}...')
          snapshot_download(
              repo_id=hf_repo,
              revision=revision,
              local_dir='checkpoint',
              token=token
          )
          "
          
      - name: Run Evaluation
        # We run the actual evaluation script with hardware acceleration on the GPU
        env:
          MUJOCO_GL: egl
          PYOPENGL_PLATFORM: egl
        run: |
          mkdir -p outputs/infected_${{ inputs.infection_level }}_seed_${{ inputs.seed }}
          
          # Move ACT model checkpoint into place since eval_act.py expects /root/act_infected
          # For GH Action, we'll run eval_act.py with a patch or pass the model dir.
          # Oh wait, eval_act.py doesn't take --policy_path. We will modify eval_act.py next.
          python eval_act.py \
            --model infected \
            --episodes 50 \
            --policy_path checkpoint \
            --output outputs/infected_${{ inputs.infection_level }}_seed_${{ inputs.seed }}/eval_info.json \
            --infection_level ${{ inputs.infection_level }} \
            --seed ${{ inputs.seed }}
          
      - name: Generate Verification Payload
        # We do NOT pass EVAL_PRIVATE_KEY here. We only generate the unsigned payload.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          json_path="outputs/infected_${{ inputs.infection_level }}_seed_${{ inputs.seed }}/eval_info.json"
          manifest_path="scratch/experiment_manifest.yaml"
          phase="${{ inputs.phase }}"
          infection=${{ inputs.infection_level }}
          seed=${{ inputs.seed }}
          run_id=${{ github.run_id }}
          eval_commit_sha=${{ github.sha }}
          nonce="nonce_${infection}_${seed}_$(date +%s)"
          attestation_level="spot_checked_interim"
          
          python scratch/verify_logs.py "$json_path" "$manifest_path" "$phase" "$infection" "$seed" "$run_id" "$eval_commit_sha" "$nonce" "$attestation_level"
          
      - name: Upload Unsigned Payload
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-payload
          path: unsigned_payload.json

      - name: Upload Eval Info
        uses: actions/upload-artifact@v4
        with:
          name: eval-info-infected-${{ inputs.infection_level }}-seed-${{ inputs.seed }}
          path: outputs/infected_${{ inputs.infection_level }}_seed_${{ inputs.seed }}/eval_info.json

  sign_results:
    needs: evaluate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at pinned commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.eval_commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install cryptography
        run: pip install cryptography

      - name: Download Unsigned Payload
        uses: actions/download-artifact@v4
        with:
          name: unsigned-payload
          
      - name: Sign Payload
        env:
          EVAL_PRIVATE_KEY: ${{ secrets.EVAL_PRIVATE_KEY }}
        run: |
          python scratch/sign_payload.py unsigned_payload.json > signed_payload.json

      - name: Append to Ledger
        run: |
          cat signed_payload.json >> verification_ledger.jsonl
          
      - name: Upload Cryptographic Ledger
        uses: actions/upload-artifact@v4
        with:
          name: verification-ledger-infected-${{ inputs.infection_level }}-seed-${{ inputs.seed }}
          path: verification_ledger.jsonl
