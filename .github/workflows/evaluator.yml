name: Model Evaluation (Trusted Boundary)

run-name: Model Eval - Inf ${{ inputs.infection_level }} - Seed ${{ inputs.seed }} - Nonce ${{ inputs.nonce }}

on:
  workflow_dispatch:
    inputs:
      huggingface_repo:
        description: 'Hugging Face repository ID (e.g., user/model_repo)'
        required: true
        type: string
      hf_revision:
        description: 'The Hugging Face commit SHA'
        required: true
        type: string
      eval_commit_sha:
        description: 'The Git commit SHA of the codebase that must match main'
        required: true
        type: string
      infection_level:
        description: 'The infection level of the run'
        required: true
        type: number
      seed:
        description: 'The random seed of the run'
        required: true
        type: number
      nonce:
        description: 'Unique execution nonce to prevent API polling races'
        required: true
        type: string

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Force checkout main to prevent Executor from changing evaluation scripts on a branch
          ref: main
          fetch-depth: 0

      - name: Verify Code Commit Pinning
        # Enforce that the clean checkout of main is exactly the commit that was audited and run by the orchestrator.
        # This prevents any TOCTOU updates to main between training and evaluation steps.
        run: |
          current_sha=$(git rev-parse HEAD)
          expected_sha="${{ github.event.inputs.eval_commit_sha }}"
          echo "Current main branch HEAD SHA: $current_sha"
          echo "Expected orchestrator pinned SHA: $expected_sha"
          if [ "$current_sha" != "$expected_sha" ]; then
            echo "CRITICAL ERROR: Codebase mismatch! The latest commit on main does not match the orchestrator commit."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gym-aloha==0.1.1 cryptography pyyaml statsmodels
          
      - name: Download Checkpoint from Hugging Face Commit (Provenance Binding)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import hf_hub_download
          import os
          hf_repo = '${{ github.event.inputs.huggingface_repo }}'
          revision = '${{ github.event.inputs.hf_revision }}'
          token = os.environ.get('HF_TOKEN')
          token = token if token else None
          print(f'Downloading from {hf_repo} revision {revision}...')
          hf_hub_download(
              repo_id=hf_repo,
              filename='bc_model.pt',
              revision=revision,
              local_dir='checkpoint',
              token=token
          )
          "
          
      - name: Run Evaluation
        # We run the actual evaluation script in CPU mode (headless)
        run: |
          mkdir -p outputs/infected_${{ github.event.inputs.infection_level }}_seed_${{ github.event.inputs.seed }}
          
          python eval_policy.py \
            --policy_path checkpoint/bc_model.pt \
            --task AlohaInsertion-v0 \
            --n_episodes 500 \
            --device cpu \
            --output outputs/infected_${{ github.event.inputs.infection_level }}_seed_${{ github.event.inputs.seed }}/eval_info.json \
            --infection_level ${{ github.event.inputs.infection_level }} \
            --seed ${{ github.event.inputs.seed }}
          
      - name: Cryptographic Verification
        env:
          EVAL_PRIVATE_KEY: ${{ secrets.EVAL_PRIVATE_KEY }}
        run: |
          json_path="outputs/infected_${{ github.event.inputs.infection_level }}_seed_${{ github.event.inputs.seed }}/eval_info.json"
          manifest_path="scratch/experiment_manifest.yaml"
          phase="sweep_logging"
          infection=${{ github.event.inputs.infection_level }}
          seed=${{ github.event.inputs.seed }}
          
          python scratch/verify_logs.py "$json_path" "$manifest_path" "$phase" "$infection" "$seed"
          
      - name: Upload Cryptographic Ledger
        uses: actions/upload-artifact@v4
        with:
          name: verification-ledger-infected-${{ github.event.inputs.infection_level }}-seed-${{ github.event.inputs.seed }}
          path: verification_ledger.jsonl
          
      - name: Upload Eval Info
        uses: actions/upload-artifact@v4
        with:
          name: eval-info-infected-${{ github.event.inputs.infection_level }}-seed-${{ github.event.inputs.seed }}
          path: outputs/infected_${{ github.event.inputs.infection_level }}_seed_${{ github.event.inputs.seed }}/eval_info.json
