# experiment_manifest.yaml
# PRE-REGISTERED EXPERIMENTAL DESIGN

experiment_name: "ACT_Operator_Hesitation_Sweep"
architecture: "ACT" # Escalated from MLP-BC due to floor effect

# The orchestrator is not permitted to modify this manifest.
# Verification secret key is stored in GitHub Secrets and read via env vars.

escalation_rule: "Escalation to ACT triggered by failed MLP-BC baseline."

hyperparameter_search_space:
  learning_rate:
    type: "fixed"
    value: 1e-3
  batch_size:
    type: "fixed"
    value: 256
  training_steps:
    type: "fixed"
    value: 100
  hidden_dim:
    type: "fixed"
    value: 256

# Canary gate: auto-abort the sweep if the clean baseline model cannot
# solve the task at all. Prevents burning 24 more jobs on a dead architecture.
canary_gate:
  min_clean_success_rate: 0.05   # At least 5% on clean data (infection=0)
  auto_abort: true               # Don't ask, just stop
  max_canary_cost_jobs: 1        # Only 1 job wasted if canary fails

conditions:
  infection_levels: [0, 25, 50, 75, 100]
  seeds: [1001, 2002, 3003, 4004, 5005]
  exploratory_seeds: [1001, 9001, 9002, 9003]
  total_training_jobs: 25

evaluation:
  episodes_per_model: 50
  success_metric: "recomputed_from_episodes"

analysis_plan:
  family: "binomial"
  link: "logit"
  predictor: "linear"
  cov_type: "bias_reduced"
  alpha_threshold: 0.05
  aggregation: "model_level_25_rows"

hyperparameters_hash: "d27df5f35d55c9e8ccd4325f1e8943f945c1f5cb47b574be43b30db10de79b4b"

