# experiment_manifest.yaml
# PRE-REGISTERED EXPERIMENTAL DESIGN

experiment_name: "ACT_Operator_Hesitation_Sweep"

# The orchestrator is not permitted to modify this manifest.
# Verification secret key is stored in GitHub Secrets and read via env vars.

hyperparameter_search_space:
  learning_rate:
    type: "choice"
    values: [1e-5, 5e-5, 1e-4]
  batch_size:
    type: "choice"
    values: [8, 16, 32]
  chunk_size:
    type: "choice"
    values: [50, 100]
  training_steps:
    type: "fixed"
    value: 200000

baseline_target_success_rate: 50.0

conditions:
  infection_levels: [0, 25, 50, 75, 100]
  seeds: [1001, 2002, 3003, 4004, 5005]
  exploratory_seeds: [9001, 9002, 9003]
  total_training_jobs: 25

evaluation:
  episodes_per_model: 500
  success_metric: "recomputed_from_episodes"

analysis_plan:
  family: "binomial"
  link: "logit"
  predictor: "linear"
  cov_type: "bias_reduced"
  alpha_threshold: 0.05
  aggregation: "model_level_25_rows"

