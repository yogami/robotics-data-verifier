name: ACT Smoke Test (CPU)

on:
  workflow_dispatch:

jobs:
  smoke-test-act:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install basic PyTorch (CPU)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Install lerobot from github with dataset, aloha, and training extras
          pip install "lerobot[aloha,dataset,training] @ git+https://github.com/huggingface/lerobot.git"
          pip install pyarrow pandas

      - name: Run ACT Smoke Test (1000 steps)
        run: |
          # We train the ACT model on the clean dataset (infection=0) for just 1000 steps.
          # This is to verify that ACT can initialize and loss decreases on this task.
          python -m lerobot.scripts.lerobot_train \
            --policy.type=act \
            --env.type=aloha \
            --dataset.repo_id=gopalyami/aloha-act-sweep \
            --output_dir=outputs/act_smoke_test \
            --steps=1000 \
            --save_freq=1000 \
            --log_freq=10 \
            --save_checkpoint=false \
            --policy.push_to_hub=false \
            --wandb.enable=false
          
      - name: Verify Training Outputs
        run: |
          if [ -d "outputs/act_smoke_test/checkpoints" ]; then
            echo "Smoke test completed successfully."
            ls -la outputs/act_smoke_test/checkpoints
          else
            echo "Training did not complete as expected."
            exit 1
          fi
