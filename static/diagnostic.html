<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Quality Gate | Live Diagnostic Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --danger: #f43f5e;
            --success: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.15) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.39);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.23);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Terminal Output */
        .terminal {
            display: none;
            background: #020617;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid #1e293b;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
            overflow-x: auto;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 1rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background-color: #f87171; }
        .dot.yellow { background-color: #facc15; }
        .dot.green { background-color: #4ade80; }

        .line {
            margin: 0.5rem 0;
            line-height: 1.5;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-primary { color: var(--primary); }
        
        .anomaly-card {
            background: rgba(244, 63, 94, 0.1);
            border-left: 4px solid var(--danger);
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
        }

        .highlight-cost {
            font-size: 1.2rem;
            color: #fbbf24;
            font-weight: bold;
            margin-top: 1rem;
            text-align: right;
            border-top: 1px dashed #334155;
            padding-top: 1rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Data Quality Gate</h1>
            <p>Live verification of kinematic entropy & sim-to-real drift.</p>
        </div>

        <div class="card">
            <p style="margin-top: 0; margin-bottom: 1.5rem; color: var(--text-secondary); line-height: 1.6;">
                Choose between running the V3 Quality Gate on simulated bimanual teleop streams, or fetching and auditing actual open-source dataset episodes directly from the Hugging Face hub.
            </p>
            
            <!-- Slack Integration -->
            <div style="margin-bottom: 1.5rem;">
                <label for="webhookUrl" style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;">
                    Slack Webhook URL (Optional - Test Live Incident Notifications):
                </label>
                <input type="text" id="webhookUrl" placeholder="https://hooks.slack.com/services/..." style="width: 100%; box-sizing: border-box; padding: 0.75rem; background: #020617; border: 1px solid #1e293b; border-radius: 8px; color: white; font-family: 'Fira Code', monospace; font-size: 0.85rem;">
            </div>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <button id="runBtnDemo" class="btn" onclick="runDiagnostic('/api/diagnostic-demo', 'runBtnDemo')">
                    <span>1. Run Simulated ALOHA Demo</span>
                    <div id="spinnerDemo" class="spinner"></div>
                </button>
                
                <button id="runBtnReal" class="btn" style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);" onclick="runDiagnostic('/api/diagnostic-real', 'runBtnReal')">
                    <span>2. Audit Real HF Dataset</span>
                    <div id="spinnerReal" class="spinner"></div>
                </button>
            </div>

            <div id="terminal" class="terminal">
                <div class="terminal-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div id="terminal-content"></div>
            </div>
        </div>
    </div>

    <script>
        async function runDiagnostic(endpoint, btnId) {
            const btn = document.getElementById(btnId);
            const spinnerId = btnId === 'runBtnDemo' ? 'spinnerDemo' : 'spinnerReal';
            const spinner = document.getElementById(spinnerId);
            const terminal = document.getElementById('terminal');
            const content = document.getElementById('terminal-content');
            
            const otherBtnId = btnId === 'runBtnDemo' ? 'runBtnReal' : 'runBtnDemo';
            const otherBtn = document.getElementById(otherBtnId);
            
            const webhookUrl = document.getElementById('webhookUrl').value.trim();
            const finalEndpoint = webhookUrl ? `${endpoint}?slack_webhook=${encodeURIComponent(webhookUrl)}` : endpoint;

            // UI Loading state
            btn.disabled = true;
            otherBtn.disabled = true;
            spinner.style.display = 'block';
            terminal.style.display = 'block';
            content.innerHTML = `
                <div class="line text-secondary">> Initializing diagnostic pipeline...</div>
                <div class="line text-secondary">> Connecting to Hugging Face dataset buffer (if running real audit)...</div>
                <div class="line text-secondary">> Calculating velocity-gated joint deltas and action mappings...</div>
            `;

            try {
                const response = await fetch(finalEndpoint);
                const data = await response.json();

                if (data.status === "success") {
                    renderReport(data.report);
                } else {
                    content.innerHTML += `<div class="line text-danger">> Error: Failed to execute pipeline. ${data.message}</div>`;
                }
            } catch (error) {
                content.innerHTML += `<div class="line text-danger">> Error: Connection to backend failed.</div>`;
            } finally {
                btn.disabled = false;
                otherBtn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function renderReport(report) {
            const content = document.getElementById('terminal-content');
            
            let html = `
                <div class="line text-primary">> Audit complete. Generating JSON report...</div>
                <div class="line"><br></div>
                <div class="line"><strong>Dataset:</strong> ${report.dataset}</div>
                <div class="line"><strong>Episodes Analyzed:</strong> ${report.total_episodes_analyzed}</div>
                <div class="line"><strong>Slack Notification:</strong> <span style="color: #fbbf24; font-weight: bold;">${report.slack_alert_status || 'NOT_TRIGGERED'}</span></div>
            `;

            if (report.failed_episodes.length === 0) {
                html += `<div class="line text-success">✅ All episodes passed quality gates.</div>`;
            } else {
                html += `<div class="line text-danger" style="margin-top: 1rem;">🚨 FOUND ${report.failed_episodes.length} CORRUPTED EPISODES</div>`;
                
                report.failed_episodes.forEach(fail => {
                    html += `
                        <div class="anomaly-card">
                            <div><strong>Episode:</strong> ${fail.episode}</div>
                            <div class="text-danger"><strong>Error Type:</strong> ${fail.error_type} (${fail.severity})</div>
                            <div><strong>Metric:</strong> ${fail.metric}</div>
                            <div style="color: #94a3b8; margin-top: 0.5rem; font-size: 0.85rem;">${fail.reason}</div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="highlight-cost">
                    Estimated Compute Waste Avoided: $${report.estimated_compute_waste_saved_usd.toLocaleString()} USD
                </div>
            `;
            if (report.plot_url) {
                html += `
                    <div style="margin-top: 2rem; text-align: center;">
                        <img src="${report.plot_url}" alt="Architecture-Aware Calibration Drift Plot" style="max-width: 100%; border-radius: 8px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                    </div>
                `;
            }

            content.innerHTML += html;
        }
    </script>
</body>
</html>
